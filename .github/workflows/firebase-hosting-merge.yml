# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci && npm run build
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Decode service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CONTENT_QUALITY_TRACKER }}' > service-account.json
      - name: Enable Firebase web frameworks experiment
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: firebase experiments:enable webframeworks --project content-quality-tracker
      - name: Deploy to Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: service-account.json
        run: firebase deploy --only hosting --project content-quality-tracker
